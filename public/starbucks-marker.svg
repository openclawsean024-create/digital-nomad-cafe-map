<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="19" fill="#00704A" stroke="#005C3B" stroke-width="1"/>
  <!-- Simplified Starbucks siren as stylized twin-tailed mermaid -->
  <g fill="white" transform="translate(20,20) scale(0.38)">
    <!-- Head/crown -->
    <circle cx="0" cy="-22" r="10"/>
    <!-- Crown points -->
    <path d="M-8,-30 L0,-20 L8,-30 L0,-24 Z"/>
    <path d="M-12,-26 L0,-16 L0,-24 Z"/>
    <path d="M12,-26 L0,-16 L0,-24 Z"/>
    <!-- Body -->
    <ellipse cx="0" cy="8" rx="18" ry="22"/>
    <!-- Inner ring -->
    <circle cx="0" cy="8" r="10" fill="#00704A"/>
    <!-- S letter stylized -->
    <text x="0" y="12" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">S</text>
  </g>
</svg>
